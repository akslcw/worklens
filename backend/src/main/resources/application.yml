server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3308/app_monitor?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:worklens123}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.worklens.backend.entity
  configuration:
    map-underscore-to-camel-case: true

deepseek:
  api-key: ${DEEPSEEK_API_KEY:your-key-here}
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat

jwt:
  secret: ${JWT_SECRET:worklens-secret-key-2026-must-be-long-enough}
  expiration: 86400000